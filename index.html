<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>One Piece Wiki</title>
</head>
<body>

    <main class="wanted-poster">
      

        <div class="image-container">
            <img src="#" alt="Character" class="char_image">
        </div>

        <div class="char_info">
            <h1 class="char_name">Carregando...</h1>
            <p class="char_role"></p>
        </div>

    <div class="char_info">
    <p class="char_role"></p>
    <p class="char_bounty">RECOMPENSA: <span></span></p>
    <p class="char_fruit">AKUMA NO MI: <span></span></p>
</div>

 <form class="search-form">
            <input type="search" class="input_search" placeholder="Nome do personagem..." required />
        </form>
<div class="navigation">
            <button class="btn btn-prev">Anterior</button>
            <button class="btn btn-next">Próximo</button>
        </div>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
