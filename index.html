<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Piece Bounty Hunter</title>
    
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <div class="app-wrapper">
        
        <div class="info-board">
            <h1 class="char_name">Monkey D. Luffy</h1>
            <p class="char_role">Carregando...</p>
            
            <p class="char_bounty">
                RECOMPENSA: <span>B 0</span>
            </p>
            
            <p class="char_fruit">
                AKUMA NO MI: <span>Nenhuma</span>
            </p>
        </div>

        <div class="wanted-poster">
            <div class="poster-image">
                <img src="" alt="Personagem" class="char_image">
            </div>
        </div>

        <div class="controls-board">
            
            <form class="search-form">
                <input 
                    type="search" 
                    class="input_search" 
                    placeholder="Digite o nome do personagem..." 
                    required
                >
            </form>

            <div class="navigation">
                <button class="btn btn-prev">Anterior</button>
                <button class="btn btn-next">Próximo</button>
            </div>

        </div>

    </div>

    <script src="./js/script.js"></script>
</body>
</html>
